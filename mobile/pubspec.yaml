name: retail_whatsapp_loyalty
description: Retail WhatsApp loyalty platform for local shops.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.2
  http: ^1.2.2
  dio: ^5.4.3
  qr_flutter: ^4.1.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  share_plus: ^10.1.2
  image_gallery_saver: ^2.0.3
  printing: ^5.13.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  intl: ^0.20.1
  path_provider: ^2.1.5
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
