name: Uptime Ping

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: uptime-ping
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping backend health
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 20 --retry 2 --retry-delay 5 https://api.zappy.rest/health

      - name: Ping Evolution API
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 20 --retry 2 --retry-delay 5 https://wa.zappy.rest/
