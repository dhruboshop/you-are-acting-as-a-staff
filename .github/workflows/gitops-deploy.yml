name: GitOps Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: gitops-deploy-main
  cancel-in-progress: false

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript build
        run: npm run build

      - name: Backend tests
        run: npm test

      - name: Lint
        run: npm run lint

  validate-environment:
    name: Validate Environment Contract
    runs-on: ubuntu-latest
    needs:
      - backend-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .env.example keys
        shell: bash
        run: |
          set -euo pipefail
          required_vars=(
            PORT
            NODE_ENV
            DATABASE_URL
            SUPABASE_URL
            SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            GOOGLE_CLIENT_ID
            JWT_SECRET
            EVOLUTION_API_URL
            EVOLUTION_API_KEY
            API_BASE_URL
            WEB_APP_URL
            FRONTEND_URL
            APP_NAME
            LOG_LEVEL
          )

          for key in "${required_vars[@]}"; do
            if ! grep -Eq "^${key}=" .env.example; then
              echo "Missing ${key} in .env.example"
              exit 1
            fi
          done

  validate-supabase-migrations:
    name: Validate Supabase Migrations
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - validate-environment
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Verify migration files exist
        shell: bash
        run: |
          set -euo pipefail
          test -d supabase/migrations
          find supabase/migrations -type f -name '*.sql' | grep -q .

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Validate pending migrations
        run: supabase db push --dry-run --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Lint remote schema
        run: supabase db lint --linked --schema public --level warning --fail-on error

  deploy-supabase-schema:
    name: Deploy Supabase Schema
    runs-on: ubuntu-latest
    needs:
      - validate-supabase-migrations
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs:
      - deploy-supabase-schema

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: mobile
        run: flutter analyze

      - name: Flutter test
        working-directory: mobile
        run: flutter test

      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitops-android-apks
          path: mobile/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
